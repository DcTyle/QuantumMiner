name: Verify

on:
  pull_request:
  push:
    branches: ["**"]
  merge_group:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      QT_QPA_PLATFORM: offscreen
      STRICT_BOUNDARIES: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Linux GUI libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libxkbcommon-x11-0 libxcb-cursor0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run guard checks
        run: |
          chmod +x scripts/verify.sh
          VERIFY_SKIP_TESTS=1 ./scripts/verify.sh
      - name: Run tests.test_app_settings
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_app_settings ./scripts/verify.sh
      - name: Run tests.test_btc_sha256d
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_btc_sha256d ./scripts/verify.sh
      - name: Run tests.test_control_center_dark_gui
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_control_center_dark_gui ./scripts/verify.sh
      - name: Run tests.test_gpu_pulse_runtime
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_gpu_pulse_runtime ./scripts/verify.sh
      - name: Run tests.test_lane_submit
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_lane_submit ./scripts/verify.sh
      - name: Run tests.test_main_runtime_reader
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_main_runtime_reader ./scripts/verify.sh
      - name: Run tests.test_miner_pause_flow
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_miner_pause_flow ./scripts/verify.sh
      - name: Run tests.test_nonce_math
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_nonce_math ./scripts/verify.sh
      - name: Run tests.test_prediction_timeseries
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_prediction_timeseries ./scripts/verify.sh
      - name: Run tests.test_stratum_calibration
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_stratum_calibration ./scripts/verify.sh
      - name: Run tests.test_temporal_dynamics_constants
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_temporal_dynamics_constants ./scripts/verify.sh
      - name: Run tests.test_unified_safety
        run: VERIFY_SKIP_GUARDS=1 VERIFY_TEST_MODULE=tests.test_unified_safety ./scripts/verify.sh
